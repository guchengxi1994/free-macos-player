name: free_macos_player
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  media_kit: ^1.2.6 # Primary package.
  media_kit_video: ^2.0.1 # For video rendering.
  media_kit_libs_video: ^1.0.7 # Native video dependencies.

  isar_community: 3.3.2
  isar_community_flutter_libs: 3.3.2
  flutter_riverpod: ^3.3.2
  collection: ^1.19.1
  file_selector: ^1.1.0
  window_manager: ^0.5.1
  go_router: ^17.3.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  isar_community_generator: 3.3.2
  build_runner: any

flutter:
  uses-material-design: true
