name: free_macos_player
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.4

isar_version: &isar_version 3.3.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  media_kit: ^1.2.6 # Primary package.
  media_kit_video: ^2.0.1 # For video rendering.
  media_kit_libs_video: ^1.0.7 # Native video dependencies.

  isar_community: 
    version: *isar_version
  isar_community_flutter_libs: # contains Isar Core
    version: *isar_version

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  isar_community_generator: 
    version: *isar_version
  build_runner: any

flutter:
  uses-material-design: true

